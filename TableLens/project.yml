name: TableLens
options:
  bundleIdPrefix: local.utolaris
configs:
  Debug: debug
  Release: release
targets:
  TableLens:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: TableLens
        excludes:
          - Info.plist
          - "**/*.svg"
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: TableLens/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: local.utolaris.TableLens
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
